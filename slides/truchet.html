
<!-- What's the length of one side of the tile, in the red dashed area?
     6 = (1 + 2) * 2 -->

<!-- How far is the tile offset from the edge of the symbol/path?
     2 = max(1, 2) -->

     <svg style="display:none">
<symbol id="base">
  <!--
    For the background, draw a square that fills the whole tile, then
    four circles on each of the corners.
    -->
  <g class="background">
    <rect x="4" y="4" width="12" height="12"/>
    <circle cx=" 4 "            cy=" 4 "            r=" 4 "/>
    <circle cx=" 16 " cy=" 4 "            r=" 4 "/>
    <circle cx=" 4 "            cy=" 16 " r=" 4 "/>
    <circle cx=" 16 " cy=" 16 " r=" 4 "/>
  </g>
  <!--
    For the foreground, draw four circles on the middle of each tile edge.
    -->
  <g class="foreground">
    <circle cx="4" cy="10" r=" 2 "/>
    <circle cx=" 16 " cy="10"       r=" 2 "/>
    <circle cx=" 10 "       cy=" 4 "            r=" 2 "/>
    <circle cx=" 10 "       cy=" 16 " r=" 2 "/>
  </g>
</symbol>
</svg>

<!--
  Slash:
    - Move to the top edge, left-hand vertex of the slash
    - Line to the top edge, right-hand vertex
    - Smaller arc to left egde, upper vertex
    - Line down to left edge, lower vertex
    - Larger arc back to the start
-->
    <svg style="display: none;">
<path
  id="slash"
  d="M  8   4 
     l  4  0
     a  4   4  0 0 0  4   4 
     l 0  4 
     a  8   8  0 0 1  -8   -8 "/>

<!--
  wedge:
    - Move to the top edge, left-hand vertex of the slash
    - Line to the top edge, right-hand vertex
    - Smaller arc to left egde, upper vertex
    - Line to centre of the tile
    - Line back to the start
-->

<path
  id="wedge"
  d="M  8   4 
     l  4  0
     a  4   4  0 0 0  4   4 
     l  0   4 
     l  -8  0"/>

<!--
  Bar: horizontal rectangle that spans the tile width and is the same height
  as a circle on the centre of an edge.
  -->

<rect
  id="bar"
  x="4" y="8"
  width="12"
  height=" 4"/>
</svg>
<svg style="display:none">
  <symbol id="carlsonT">
  <use href="#base"/>
  <use href="#wedge" class="foreground"/>
  <use href="#wedge" class="foreground" transform="rotate(90  10   10 )"/>
</symbol>
  <symbol id="carlsonT-90">
  <use href="#carlsonT" transform="rotate(90 10 10)"/>
</symbol>
  <symbol id="carlsonT-180">

</symbol>
  <symbol id="carlsonT-270">

</symbol>

</symbol>
  <symbol id="carlsonArcs">
  <use href="#base"/>

</symbol>

</symbol>
<symbol id="carlsonDivide">

</symbol>
<symbol id="carlsonDivide-90"><use href="#carlsonDivide" transform="rotate(90 10 10)"></use></symbol>
<symbol id="carlsonPlus">
  <use href="#base"/>

    <use href="#wedge" class="foreground" transform="rotate(180 10 10)"></use> 
  <use href="#wedge" class="foreground" tronsform="rotate(270 10 10)"></use>
</symbol>
<symbol id="carlsonFrown">

</symbol>
<symbol id="carlsonFrown-90">

function getTilePositions({
  columns,
  rows,
  tileSize,
}) {
  let tiles = [];
  
  // Draw layer 1 of tiles, which is a full-sized tile for
  // every row and column.
  for (i = 0; i < columns; i++) {
    for (j = 0; j < rows; j++) {
      tiles.push({ x: i * tileSize, y: j * tileSize, layer: 1 });
    }
  }
 
  return tiles;
}

function drawTruchetTiles(svg, tileTypes, tilePositions, padding) {
    
  tilePositions.forEach(c => {
    let tileName =  tileTypes[Math.floor(Math.random() * tileTypes.length)];
  
    svg.innerHTML += `
      <use
        href="#${tileName}"
        x="${c.x }"
        y="${c.y }"
        transform="translate(${padding} ${padding}) scale(5)"/>`;
  });
}
